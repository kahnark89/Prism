[versions]
kotlin = "2.0.21"
agp = "8.7.2"
coreKtx = "1.15.0"
lifecycle = "2.8.7"
activityCompose = "1.9.3"
composeBom = "2024.12.01"
navigationCompose = "2.8.4"
room = "2.6.1"
camerax = "1.4.1"
tflite = "2.16.1"
