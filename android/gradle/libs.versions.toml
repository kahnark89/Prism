mlkitFace = "16.1.7"
coroutines = "1.9.0"
kotlinxSerialization = "1.7.3"
datastore = "1.1.1"
junit = "4.13.2"
androidxJunit = "1.2.1"
espresso = "3.6.1"
truth = "1.4.4"
zxingEmbedded = "4.3.0"
